# A2A Multi-Agent Communication System Configuration

# Agent Configuration
[agents]
math_agent_port = 8001
data_analyst_agent_port = 8002
default_timeout = 30
max_retries = 3

# Protocol Configuration
[protocol]
json_rpc_version = "2.0"
supported_content_types = ["text/plain", "application/json"]
max_message_size = 1048576  # 1MB

# Logging Configuration
[logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file_logging = false
log_directory = "logs"

# Development Configuration
[development]
debug_mode = false
hot_reload = false
cors_enabled = true
cors_origins = ["*"]
